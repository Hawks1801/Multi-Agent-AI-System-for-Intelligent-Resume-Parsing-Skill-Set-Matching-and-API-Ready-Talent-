<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page - MultiagentAI</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg-deep: #0a0c10;
            --bg-panel: #12151c;
            --accent-teal: #2dd4bf;
            --accent-orange: #fb923c;
            --border-dim: #1e293b;
            --text-main: #94a3b8;
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: var(--bg-deep);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .gradient-text {
            background: linear-gradient(90deg, var(--accent-teal) 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .command-border {
            border: 1px solid var(--border-dim);
            position: relative;
        }

        .command-border::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; width: 10px; height: 10px;
            border-top: 2px solid var(--accent-teal);
            border-left: 2px solid var(--accent-teal);
        }

        .command-border::after {
            content: '';
            position: absolute;
            bottom: -1px; right: -1px; width: 10px; height: 10px;
            border-bottom: 2px solid var(--accent-teal);
            border-right: 2px solid var(--accent-teal);
        }

        .glass-header {
            background: rgba(10, 12, 16, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-dim);
        }

        .hero-grid {
            background-image: radial-gradient(var(--border-dim) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .dashboard-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-dim);
            border-radius: 0.5rem;
            transition: all 0.3s;
        }

        .dashboard-card:hover {
            border-color: var(--accent-teal);
            box-shadow: 0 0 20px rgba(45, 212, 191, 0.1);
        }

        .scan-line {
            width: 100%;
            height: 2px;
            background: var(--accent-teal);
            opacity: 0.3;
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 3s linear infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .btn-command {
            background: var(--accent-teal);
            color: var(--bg-deep);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.75rem 2rem;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%);
            transition: all 0.2s;
        }

        .btn-command:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const TestPage = () => {
            return (
                <div className="antialiased min-h-screen">
                    {/* Header */}
                    <header className="fixed top-0 w-full glass-header z-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex items-center justify-between h-20">
                                <a href="index.html" className="flex items-center gap-2">
                                    <div className="w-10 h-10 bg-teal-500 rounded-xl flex items-center justify-center">
                                        <i className="fas fa-microchip text-bg-deep text-xl"></i>
                                    </div>
                                    <span className="font-extrabold text-2xl tracking-tight text-white uppercase">Multiagent<span className="text-teal-400">AI</span></span>
                                </a>
                                <nav className="flex items-center gap-8">
                                    <a href="index.html" className="text-sm font-bold text-slate-500 hover:text-teal-400 transition-colors uppercase tracking-widest mono">Back to Home</a>
                                </nav>
                            </div>
                        </div>
                    </header>

                    {/* Content */}
                    <main className="pt-40 pb-32 hero-grid min-h-screen">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="command-border bg-panel p-20 text-center relative overflow-hidden">
                                <div className="scan-line opacity-20"></div>
                                <h1 className="text-6xl font-black text-white mb-8 uppercase tracking-tighter">
                                    <span className="gradient-text">SYSTEM TEST</span> PAGE
                                </h1>
                                <p className="text-slate-400 max-w-2xl mx-auto mb-12 text-xl font-medium">
                                    This is a secondary page designed to demonstrate consistent visual architecture across the MultiagentAI ecosystem.
                                </p>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 text-left">
                                    {[
                                        { t: 'Consistency', d: 'Sharing the same design tokens, fonts, and component structures.' },
                                        { t: 'Performance', d: 'Optimized single-file delivery with Tailwind and React.' },
                                        { t: 'Theming', d: 'Dark mode industrial aesthetic enforced across all nodes.' }
                                    ].map((item, i) => (
                                        <div key={i} className="bg-slate-900/50 p-8 border border-slate-800">
                                            <div className="mono text-[10px] text-teal-500 font-bold mb-4 uppercase tracking-widest border-b border-slate-800 pb-2">Node_0{i+1}</div>
                                            <h3 className="text-lg font-bold text-white mb-3 uppercase tracking-tight">{item.t}</h3>
                                            <p className="text-slate-500 text-sm font-medium">{item.d}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="py-20 border-t border-slate-900 text-center bg-panel relative overflow-hidden">
                        <div className="scan-line opacity-5"></div>
                        <div className="max-w-7xl mx-auto px-4 relative z-10">
                            <div className="mono text-[10px] text-slate-600 font-bold uppercase tracking-[0.4em] mb-4">
                                <span className="w-2 h-2 bg-teal-500 rounded-full inline-block mr-3 animate-pulse"></span>
                                System_Operational // Page_Consistency_Test
                            </div>
                            <p className="mono text-[9px] text-slate-700 font-medium tracking-widest uppercase">
                                Multiagent_AI_Network_v1.0.4
                            </p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TestPage />);
    </script>
</body>
</html>
